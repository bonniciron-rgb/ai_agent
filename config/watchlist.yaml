# Active watchlist used by the daily cron.
# Edit freely; symbols are uppercased automatically. Holdings are auto-merged at runtime.
# Sector strings are used by the 30%-NAV sector cap risk rail.
#
# NOTE: this YAML only seeds the DB watchlist when the DB table is EMPTY
# (see db/watchlist_store.py:bootstrap_from_yaml). To push edits into an
# already-seeded prod DB, run `python scripts/seed_watchlist.py --apply`,
# which idempotently upserts every entry below into the DB.

entries:
  # Mega-cap tech
  - symbol: AAPL
    sector: technology
  - symbol: MSFT
    sector: technology
  - symbol: GOOGL
    sector: communication_services
  - symbol: AMZN
    sector: consumer_discretionary
  - symbol: NVDA
    sector: technology
    tags: [ai]
  - symbol: META
    sector: communication_services
  - symbol: AVGO
    sector: technology
    tags: [ai, semis]
  - symbol: AMD
    sector: technology
    tags: [ai, semis]

  # Communication services / media
