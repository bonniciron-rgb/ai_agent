name: daily-digest

on:
  schedule:
    # 22:00 UTC Mon-Fri -- after reconciliation
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DAILY_COST_ALERT_USD: ${{ vars.DAILY_COST_ALERT_USD || '5.00' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[production]"

      - name: Run daily digest
        # Exit code is always 0 when cost alert fires -- the script sends a
        # Telegram alert instead.  Only a crash (exception / import error)
        # will cause a non-zero exit and mark the workflow red.
        run: python scripts/daily_digest.py
