name: macro-regime

on:
  schedule:
    # 22:30 UTC Mon-Fri -- after digest at 22:00, after market close
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  macro-regime:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[production]"

      - name: Run macro regime detector
        run: python scripts/macro_regime.py
