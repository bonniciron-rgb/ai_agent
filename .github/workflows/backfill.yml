name: backfill-ohlcv

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Years of history to fetch (e.g. 5)"
        required: false
        default: "5"
      symbol:
        description: "Single symbol to backfill (leave blank for full watchlist)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[production]"

      - name: Backfill OHLCV bars
        run: |
          ARGS="--years ${{ github.event.inputs.years }}"
          if [ -n "${{ github.event.inputs.symbol }}" ]; then
            ARGS="$ARGS --symbol ${{ github.event.inputs.symbol }}"
          fi
          python scripts/backfill_watchlist.py $ARGS

      - name: Summary
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, "src")
          os.environ.setdefault("DATABASE_URL", os.environ["DATABASE_URL"])
          from ai_agent.db.engine import get_session
          from ai_agent.db.models import Bar
          from sqlmodel import select, func
          with get_session() as s:
              rows = s.exec(
                  select(Bar.symbol, func.count(Bar.id).label("n"), func.min(Bar.trading_date).label("oldest"))
                  .group_by(Bar.symbol)
                  .order_by(Bar.symbol)
              ).all()
          print(f"\n{'Symbol':<8} {'Bars':>6}  {'Oldest bar'}")
          print("-" * 30)
          for sym, n, oldest in rows:
              print(f"{sym:<8} {n:>6}  {oldest}")
          EOF
