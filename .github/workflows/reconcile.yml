name: nightly-reconciliation

on:
  schedule:
    # 21:00 UTC Mon–Fri — ~30 min after US market close (20:30 UTC)
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      T212_API_KEY: ${{ secrets.T212_API_KEY }}
      T212_ENV: ${{ vars.T212_ENV || 'demo' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[production]"

      - name: Run reconciliation
        # Exit code is always 0 when drift is detected — the script sends a
        # Telegram alert instead.  Only a crash (exception / import error)
        # will cause a non-zero exit and mark the workflow red.
        run: python scripts/reconcile.py
