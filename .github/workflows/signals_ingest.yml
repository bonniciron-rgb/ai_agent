name: signals-ingest

on:
  schedule:
    # Runs at 06:25 UTC Mon-Fri — 5 minutes before the daily trading loop.
    # Change "daily" → "hourly" in config/external_signals.yaml AND update
    # the cron below to "0 * * * 1-5" to run every hour on weekdays.
    - cron: "25 6 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch + parse but do not persist to DB)"
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[production]"

      - name: Run signals ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          # Pass through bot token so ingest failures can alert via Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m ai_agent.external_signals.ingest
