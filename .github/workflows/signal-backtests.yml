name: signal-backtests

on:
  workflow_dispatch:
    inputs:
      backtest_start:
        description: "Backtest start date (YYYY-MM-DD). Blank = trailing window."
        required: false
        default: ""
      backtest_end:
        description: "Backtest end date (YYYY-MM-DD). Blank = today."
        required: false
        default: ""
      backtest_lookback_days:
        description: "Trailing window length in days (used when start is blank)."
        required: false
        default: "1460"
  schedule:
    # First Monday of every month at 07:00 UTC — keep validation fresh.
    - cron: "0 7 1-7 * 1"

permissions:
  contents: read

jobs:
  run-backtests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      SEC_EDGAR_USER_AGENT: ${{ vars.SEC_EDGAR_USER_AGENT || 'Ethera Trading research@etheratrading.example' }}
      BACKTEST_START: ${{ inputs.backtest_start }}
      BACKTEST_END: ${{ inputs.backtest_end }}
      BACKTEST_LOOKBACK_DAYS: ${{ inputs.backtest_lookback_days || '1460' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[production]"

      - name: Run unified signal backtest
        run: python scripts/run_all_backtests.py

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_id }}
          path: backtest_results.json
          retention-days: 90

      - name: Print quick summary
        if: always()
        run: |
          if [ -f backtest_results.json ]; then
            python -c "
          import json, sys
          d = json.load(open('backtest_results.json'))
          bm = d['benchmark']
          print(f\"SPY benchmark — Sharpe {bm['sharpe']:.2f}, CAGR {bm['cagr']*100:.1f}%, MaxDD {bm['max_drawdown']*100:.1f}%\")
          for r in d['signals']:
              m = r.get('metrics')
              if not m:
                  print(f\"{r['signal']}: no data\"); continue
              print(f\"{r['signal']}: Sharpe {m['sharpe']:.2f}, CAGR {m['cagr']*100:.1f}%, MaxDD {m['max_drawdown']*100:.1f}%, alpha {m['alpha']*100:.1f}%, trades {m['trade_count']}\")
          "
          fi
