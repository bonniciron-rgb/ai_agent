name: daily-trade-loop

on:
  schedule:
    # 06:30 UTC Mon–Fri (US pre-market; skipped on weekends by the OS scheduler,
    # but we add a weekday guard in the job itself for robustness).
    - cron: "30 6 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes, no Telegram)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      T212_API_KEY: ${{ secrets.T212_API_KEY }}
      T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
      # Hardcoded live: the account is live-only and the vars.T212_ENV override
      # proved unreliable (commit 702e104). Read-only loop; no order placement.
      T212_ENV: live
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TRADING_HALTED: ${{ vars.TRADING_HALTED || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[production]"

      - name: Run daily loop
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m ai_agent.loop.daily_loop $DRY_RUN_FLAG
